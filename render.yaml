services:
  - type: web
    name: ajaia-docs
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_PATH
        value: /app/server/data/ajaia.db
    disk:
      name: ajaia-data
      mountPath: /app/server/data
      sizeGB: 1
